.home-s{font-size:13px;color:var(--t3);margin-top:2px}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.home-card{background:#fff;border:1px solid var(--b1);border-radius:4px;padding:24px;cursor:pointer;transition:all .15s}
.home-card:hover{border-color:var(--teal);box-shadow:0 4px 20px rgba(184,154,78,.12);transform:translateY(-2px)}
.hc-title{font-size:19px;font-weight:700;color:var(--t1)}
.hc-who{font-size:12px;color:var(--t3);margin:4px 0 14px}
.hc-bar{height:8px;background:#EEE;border-radius:4px;overflow:hidden}
.hc-fill{height:100%;background:var(--teal);border-radius:4px}
.hc-num{font-size:12px;color:var(--t2);margin-top:7px;font-weight:600}
.role-head{padding:18px 4px 14px}
.rh-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--t1)}
.rh-who{font-size:13px;color:var(--t3);font-weight:400;margin-left:10px}
.rh-hint{font-size:12px;color:var(--t3);margin-top:3px}
.rtype-bar{display:flex;gap:10px;margin-bottom:16px}
.rtype{flex:1;padding:14px;border:1px solid var(--b1);background:#fff;border-radius:4px;font-size:15px;font-weight:600;color:var(--t2);cursor:pointer}
.rtype:hover{border-color:var(--teal)}
.rtype.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.role-empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.rcamp-list{display:flex;flex-direction:column;gap:10px}
.rcamp{border:1px solid var(--b1);border-radius:4px;background:#fff;overflow:hidden}
.rcamp.open{border-color:var(--teal);box-shadow:0 2px 14px rgba(184,154,78,.1)}
.rcamp-head{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer}
.rcamp-head:hover{background:#FAFEFE}
.rc-name{font-weight:600;color:var(--t1);font-size:15px;flex:1}
.rc-mon{font-size:12px;color:var(--t3)}
.rc-stat{font-size:12px;font-weight:600;padding:4px 12px;border-radius:4px}
.rc-ok{background:#E3F7F4;color:#1A8C82}
.rc-todo{background:#FBF0DD;color:#B8841F}
.rc-none{background:#F2F2F2;color:#999}
.rcamp-body{padding:0 12px 14px;border-top:1px solid #F0F0F0}

/* === 專業文件風格精修 === */
body{color:var(--t1)}
.wrap{max-width:1100px;margin:0 auto}
/* 標題：金色裝飾 */
.home-t,.rh-title,.role-head .rh-title{color:var(--t1);border-left:3px solid var(--gold);padding-left:12px}
/* tab：選中藍底線、清晰 */
.tab{color:var(--t2);font-weight:500;border-bottom:2px solid transparent;border-radius:0}
.tab.on{color:var(--blue);border-bottom:2px solid var(--blue);font-weight:600}
/* 首頁卡：清晰邊框、頂部金線、小圓角 */
.home-card{border:1px solid var(--b2);border-radius:4px;box-shadow:none;border-top:3px solid var(--gold)}
.home-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:none}
.hc-title{color:var(--t1);font-weight:700}
.hc-bar{background:#ECECEC;border-radius:2px;height:6px}
.hc-fill{background:var(--blue);border-radius:2px}
/* 大/季/週 鈕：清晰、選中藍 */
.rtype{border:1px solid var(--b2);border-radius:4px;color:var(--t2);font-weight:600;background:#fff}
.rtype:hover{border-color:var(--blue);color:var(--t1)}
.rtype.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* 檔期卡：清晰邊框、選中藍左邊 */
.rcamp{border:1px solid var(--b2);border-radius:4px}
.rcamp.open{border-color:var(--blue);border-left:3px solid var(--blue);box-shadow:none}
.rcamp-head:hover{background:#F5FAF9}
.rc-name{color:var(--t1);font-weight:600}
/* 狀態標籤：對比加強 */
.rc-ok{background:#E0F2EF;color:#0E6B62;border:1px solid #9DD4CC}
.rc-todo{background:#FBF3E0;color:#8A6A1E;border:1px solid #E0CC93}
.rc-none{background:#F0F0F0;color:#777;border:1px solid #D5D5D5}
/* 狀態鈕 拍銷官OA：清晰 */
.flagb{border-radius:3px;border:1px solid var(--b2);background:#F5F5F5;color:#666;font-weight:600}
.flagb.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.flagb.locked,.flagb.notmine{opacity:.45}
/* deadline / 檔標籤：小圓角 */
.dctag,.dldl,.rc-stat{border-radius:3px}
.dl-near{background:#FBF3E0;color:#8A6A1E}
.dl-over{background:#FBE3E3;color:#B0322C}
.dl-ok{background:#EEF5F4;color:#3D6B64}
/* 月份/檔頭：金色細節 */
.month .mhead{border-bottom:1px solid var(--b1)}
.lockbadge{color:var(--gold)}
/* input：清晰邊框小圓角 */
.qtybox input,.field input,.field select,.field textarea{border:1px solid var(--b2);border-radius:3px}
.qtybox input:focus{border-color:var(--blue)}
/* 工作量條 */
.wl-fill{background:var(--gold)}
.wl-track{background:#ECECEC;border-radius:2px}
/* 登入框 */
.lg-card{border:1px solid var(--b2);border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.lg-btn{background:var(--blue);border-radius:4px}
.lg-btn:hover{background:#000000}
.lg-card select,.lg-card input{border-radius:4px;border:1px solid var(--b2)}
/* 按鈕統一小圓角 */
.btn,.impb,.rsto,.lockb,.clrb,.expb,.btn-primary,.btn-outline{border-radius:4px}

.ch2{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0 10px}
.ch2 .cmeta{font-size:12px;color:var(--t3)}
.ch2 .cgoal{color:var(--t2)}
.ch2 .editc{color:var(--blue);cursor:pointer;margin-left:6px}
.ch2 .cright{text-align:right}
.ch2 .rev{font-size:20px;font-weight:700;color:var(--t1)}
.ch2 .rl{font-size:10px;color:var(--t3)}
.camp .cbody{border-top:none;padding:0}

/* 展開內容字體加大 */
.camp .brief{font-size:14px;line-height:1.7}
.camp .who{font-size:13px}
.camp .pn{font-size:15px;font-weight:600}
.camp .prow{font-size:13px}
.ch2 .cmeta{font-size:13px}
.recToggle{font-size:13px}
.rrow .rn{font-size:14px}
.rrow{font-size:13px}
.catb{font-size:13px;padding:5px 12px}
.flagb{font-size:12px;padding:4px 11px}
.qtybox input{font-size:14px}
.sl{font-size:13px}
.camp .empty{font-size:13px}
.pstatus,.prow-sub{font-size:12px}

/* === 品行三層分區，清楚的視覺語言 === */
.prow{display:block;border:1px solid var(--b1);border-radius:5px;padding:12px 14px;margin-bottom:10px;background:#fff}
.prow.allok{border-left:3px solid var(--blue);background:#FAFEFD}
/* 上層：品名 + 純文字info + 營收 + 刪除 */
.prow-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prow-top .pn{font-size:15px;font-weight:700;color:var(--t1)}
.prow-top .pinfo{font-size:12px;color:var(--t3)}  /* 純文字：灰、小、不像能點 */
.prow-top .prowrev{margin-left:auto;font-size:13px;font-weight:600;color:var(--blue)}
.prow-top .delb{width:24px;height:24px;border:1px solid var(--b2);background:#fff;border-radius:4px;color:#999;cursor:pointer;font-size:14px;line-height:1;flex-shrink:0}
.prow-top .delb:hover{border-color:#D9534F;color:#D9534F}
/* 中層：狀態鈕（明顯可點） */
.prow-flags{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.prow-flags .flbl{font-size:11px;color:var(--t3);margin-right:2px}
.flagb{font-size:12px;font-weight:600;padding:5px 14px;border-radius:4px;border:1px solid var(--b2);background:#fff;color:var(--t2);cursor:pointer;transition:all .12s}
.flagb:hover{border-color:var(--blue)}
.flagb.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.flagb.locked{opacity:.4;cursor:not-allowed;background:#F5F5F5}
.flagb.notmine{opacity:.4;cursor:not-allowed}
/* 下層：填寫區（input明顯+label，貨源/備註是鈕） */
.prow-edit{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.prow-edit .fld{display:flex;flex-direction:column;gap:3px}
.prow-edit .fld label{font-size:11px;color:var(--t3)}
.prow-edit .fld input{width:90px;border:1px solid var(--b2);border-radius:4px;padding:7px 9px;font-size:14px;background:#fff;color:var(--t1)}
.prow-edit .fld input:focus{border-color:var(--blue);outline:none}
.srcb{padding:7px 12px;border:1px solid var(--b2);border-radius:4px;background:#fff;color:var(--t2);cursor:pointer;font-size:12px}
.srcb:hover{border-color:var(--blue)}
.srcb.hc{background:#FBF3E0;border-color:#E0CC93;color:#8A6A1E}
.memob{padding:7px 12px;border:1px dashed var(--b2);border-radius:4px;background:#fff;color:var(--t3);cursor:pointer;font-size:12px}
.memob:hover{border-color:var(--blue);color:var(--blue)}
/* 建議下拉商品行：整行可點(加入)，hover提示 */
.rrow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #F0F0F0;cursor:pointer;transition:background .1s}
.rrow:hover{background:#F0FAF9}
.rrow .rn{flex:1;font-size:14px;color:var(--t1)}
.rrow .rcat{font-size:11px;color:#fff;padding:2px 8px;border-radius:3px}  /* 標籤：圓角小、不像鈕 */
.rrow .rp{font-size:13px;font-weight:600;color:var(--t2)}
.rrow .rm{font-size:11px;color:var(--t3)}
.rrow .ab{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid var(--b2);border-radius:4px;color:var(--blue);font-size:15px;flex-shrink:0}
.rrow:hover .ab{background:var(--blue);color:#fff;border-color:var(--blue)}
.rrow.added{background:#F0FAF9}
.rrow.added .ab{background:#E0F2EF;color:#0E6B62;border-color:#9DD4CC}

.planbox{background:#FBF8F0;border:1px solid #E8DCC0;border-left:4px solid var(--gold);border-radius:6px;padding:14px 16px;margin-bottom:16px}
.planbox-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.planbox-t{font-size:14px;font-weight:700;color:#8A6A1E}
.planedit{background:var(--gold);color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}
.planedit:hover{background:#9A7E3A}
.plan-goal{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:8px}
.plan-brief{font-size:14px;line-height:1.7;color:var(--t2)}

.recBtn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--blue);color:var(--blue);border-radius:5px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;margin:4px 0 12px;font-family:inherit}
.recBtn:hover{background:#EAFAF8}
.recBtn.on{background:var(--blue);color:#fff}
.recBtn .recarrow{font-size:15px;font-weight:700}

.dash{margin-top:28px}
.dash-t{font-size:16px;font-weight:700;color:var(--t1);border-left:3px solid var(--gold);padding-left:12px;margin-bottom:14px}
.dash-empty{color:var(--t3);font-size:13px;padding:16px}
.dash-list{display:flex;flex-direction:column;gap:7px}
.task{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--b1);border-left:4px solid var(--b2);border-radius:5px;background:#fff;cursor:pointer;transition:all .12s}
.task:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);transform:translateX(2px)}
.task-dl{font-size:13px;font-weight:600;width:130px;flex-shrink:0}
.task-role{font-size:12px;font-weight:600;padding:3px 10px;border-radius:4px;background:#EEF5F4;color:var(--blue);flex-shrink:0}
.task-name{font-size:14px;color:var(--t1);flex:1}
.task-who{font-size:12px;color:var(--t3);flex-shrink:0}
.task.dl-over{border-left-color:#D9534F;background:#FDF3F2}
.task.dl-over .task-dl{color:#D9534F}
.task.dl-near{border-left-color:#E0A020;background:#FDF9F0}
.task.dl-near .task-dl{color:#9A7E1E}
.task.dl-ok{border-left-color:var(--teal)}
.task.dl-ok .task-dl{color:var(--t2)}

.task-prev{font-size:11px;padding:3px 9px;border-radius:4px;flex-shrink:0}
.task-prev.prev-ok{background:#E3F5E8;color:#2E7D32}
.task-prev.prev-wait{background:#FBF0DD;color:#9A6A1E}

/* 年度月曆卡片 */
.ycal{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:4px}
.ycard{border:1px solid var(--b1);border-radius:8px;overflow:hidden;background:#fff}
.ycard-h{background:#1A1A1A;color:#fff;font-size:14px;font-weight:700;padding:9px 14px;letter-spacing:.04em}
.ycard-body{padding:8px}
.yrow{display:flex;align-items:center;gap:8px;padding:9px 8px;border-radius:5px;cursor:pointer;transition:background .1s}
.yrow:hover{background:#F5F5F5}
.yrow.wk{opacity:.7}
.ytag{font-size:10px;color:#fff;padding:2px 7px;border-radius:3px;flex-shrink:0;font-weight:600}
.yname{flex:1;font-size:13px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ydate{font-size:11px;color:var(--t3);flex-shrink:0}
.ydots{display:flex;gap:3px;flex-shrink:0}
.ydot{font-size:9px;width:20px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:3px;background:#EEE;color:#AAA;border:1px solid #E0E0E0}
.ydot.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* 工作台 hero */
.wt-hero{display:flex;justify-content:space-between;align-items:center;padding:6px 0 22px;border-bottom:1px solid var(--b1);margin-bottom:22px}
.wt-hi{font-size:24px;font-weight:700;color:var(--t1)}
.wt-sub{font-size:13px;color:var(--t3);margin-top:4px}
.wt-cta{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:12px 26px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.wt-cta:hover{background:#000000}
/* 全鏈進度 */
.chain{margin-top:28px}
.chain-t{font-size:14px;font-weight:700;color:var(--t1);border-left:3px solid var(--gold);padding-left:12px;margin-bottom:14px}
.chain-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chain-step{flex:1;min-width:130px;border:1px solid var(--b1);border-radius:6px;padding:12px;cursor:pointer;transition:all .12s}
.chain-step:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chain-step.me{border-color:var(--blue);border-width:2px;background:#FAFEFD}
.cs-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:8px}
.cs-who{font-size:11px;color:var(--t3);font-weight:400;margin-left:6px}
.cs-bar{height:7px;background:#EEE;border-radius:4px;overflow:hidden;margin-bottom:6px}
.cs-fill{height:100%;background:var(--blue);border-radius:4px}
.cs-pct{font-size:12px;color:var(--t2);font-weight:600}
.chain-arrow{color:var(--t3);font-size:18px;flex-shrink:0}

/* 色彩點綴 */
.cs-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
.wt-hi{background:linear-gradient(90deg,#1A1A1A,#1A1A1A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.wt-cta{background:linear-gradient(90deg,#1A1A1A,#1A1A1A)!important}
.wt-cta:hover{background:linear-gradient(90deg,#C5006B,#9A1F58)!important}
.dash-t,.chain-t,.sec-line{border-left-color:#1A1A1A!important}
/* 月曆卡片頭部用品牌漸層 */
.ycard-h{background:linear-gradient(90deg,#1A1A1A,#3a2030)!important}
.ycard{border-top:3px solid #1A1A1A}
/* tab選中底線桃紅 */
.tab.on{color:#1A1A1A!important;border-bottom-color:#1A1A1A!important}
/* 進入選品等主鈕保持品牌色 */
.impb{background:#1A1A1A}

.ythumb{display:inline-flex;align-items:center;margin-left:6px;flex-shrink:0;animation:pop .3s ease}
.yrow.alldone{background:#F0FBF9}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

.urgent{background:#FFF8F8;border:1px solid #F3D5D5;border-radius:8px;padding:12px 14px;margin-bottom:18px}
.urgent-t{font-size:13px;font-weight:700;color:#C0392B;margin-bottom:8px}
.ub{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:5px;cursor:pointer;border-left:3px solid #ccc}
.ub:hover{background:#fff}
.ub.dl-over{border-left-color:#D9534F}
.ub.dl-near{border-left-color:#E0A020}
.ub-dl{font-size:12px;font-weight:600;width:120px;flex-shrink:0}
.ub.dl-over .ub-dl{color:#D9534F}
.ub.dl-near .ub-dl{color:#9A6A1E}
.ub-name{font-size:13px;color:var(--t1);flex:1}
.ub-prev{font-size:11px;padding:2px 8px;border-radius:4px;flex-shrink:0}

.vcamp{padding:4px 0}
.vplan{background:#FBF8F0;border-left:4px solid var(--gold);border-radius:6px;padding:12px 14px;margin-bottom:14px}
.vplan-t{font-size:13px;font-weight:700;color:#8A6A1E;margin-bottom:6px}
.vplan-goal{font-size:15px;font-weight:600;margin-bottom:6px}
.vplan-brief{font-size:14px;line-height:1.7;color:var(--t2)}
.vsec{font-size:13px;font-weight:700;color:var(--t1);margin:14px 0 8px;border-left:3px solid #1A1A1A;padding-left:10px}
.vlist{border:1px solid var(--b1);border-radius:6px;overflow:hidden}
.vrow{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #F0F0F0}
.vrow:last-child{border-bottom:none}
.vn{font-size:14px;color:var(--t1)}
.vp{font-size:13px;color:var(--t2);font-weight:600}
.vempty{color:var(--t3);font-size:13px;padding:12px}
.vweb{padding:10px 14px;border-radius:6px;font-size:14px}
.vweb.ok{background:#E3F5E8;color:#2E7D32}
.vweb.wait{background:#FBF0DD;color:#9A6A1E}
.vdone{margin-top:18px}
.vbtn{width:100%;padding:14px;border:none;border-radius:8px;background:#1A1A1A;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.vbtn:hover{background:#000000}
.vbtn.on{background:#2E7D32}
.vlock{text-align:center;padding:14px;background:#F5F5F5;border-radius:8px;color:var(--t3);font-size:14px}

.grp-h{font-size:12px;font-weight:700;padding:14px 4px 8px;letter-spacing:.03em}
.grp-todo{color:#C0392B}
.grp-done{color:var(--t3)}
.rc-tag{font-size:10px;color:#fff;padding:2px 8px;border-radius:3px;margin-right:8px;font-weight:600;flex-shrink:0}
.rcamp.open .rc-stat,.rcamp.open .dldl{}

.grp-weekly{color:#9A6A1E}
.later-note{margin-top:16px;padding:12px 16px;background:#F5F5F5;border-radius:6px;color:var(--t2);font-size:13px;text-align:center}
/* 已完成的檔：明顯綠色勾 + 淡化 */
.grp-done~.rcamp,.rcamp .rc-stat.rc-ok{}
.rc-stat.rc-ok{background:#2E7D32!important;color:#fff!important;font-weight:600}
.rc-stat.rc-ok::before{content:"✓ "}

/* 工作排列狀態外框 */
.rcamp.st-ready{border:2px solid #1A1A1A;box-shadow:0 2px 8px rgba(31,168,156,.15)}
.rcamp.st-near{border:2px solid #E0A020;box-shadow:0 2px 8px rgba(224,160,32,.15)}
.rcamp.st-over{border:2px solid #D9534F;box-shadow:0 2px 8px rgba(217,83,79,.18);background:#FFF8F8}
.rcamp.st-wait{border:1px solid #E0E0E0;opacity:.55}
.rcamp.st-done{border:1px solid #CDE8D4}
.rc-go{font-size:11px;font-weight:700;color:#fff;background:#1A1A1A;padding:3px 10px;border-radius:4px;flex-shrink:0}
.rc-wait{font-size:11px;color:#9A6A1E;background:#FBF0DD;padding:3px 10px;border-radius:4px;flex-shrink:0}
.rcamp.st-over .rc-name{color:#D9534F;font-weight:700}

.catgrp{margin-bottom:22px}
.catgrp-h{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.catgrp-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.catgrp-n{font-size:12px;color:var(--t3);font-weight:400;margin-left:auto}
.rcamp.flash{animation:flashbox 5s ease}
@keyframes flashbox{0%,100%{box-shadow:0 0 0 rgba(184,154,78,0)}20%,60%{box-shadow:0 0 0 4px rgba(184,154,78,.35);border-color:#1A1A1A}}

.ovcat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ovcat-btn{padding:8px 16px;border:1px solid var(--b1);border-radius:6px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);display:flex;align-items:center;gap:6px}
.ovcat-btn:hover{border-color:var(--t3)}
.ovcat-n{font-size:11px;opacity:.7}

.addcat{padding:7px 8px;border:1px solid var(--b1);border-radius:5px;font-family:inherit;font-size:12px;color:var(--t1);background:#fff;margin:0 6px}

.myurgent{background:#FFF8F8;border:1px solid #F3D5D5;border-radius:10px;padding:16px 18px;margin-bottom:22px}
.myurgent-t{font-size:15px;font-weight:700;color:#C0392B;margin-bottom:12px}
.mu-ico{margin-right:6px;font-size:16px}
.myurgent-empty{color:var(--t3);font-size:14px}
.myurgent-list{display:flex;flex-direction:column;gap:8px}
.mu{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#fff;border-radius:6px;cursor:pointer;border-left:3px solid #ccc}
.mu:hover{box-shadow:0 2px 6px rgba(0,0,0,.06)}
.mu.dl-over{border-left-color:#D9534F}
.mu.dl-near{border-left-color:#E0A020}
.mu-dl{font-size:12px;font-weight:600;width:130px;flex-shrink:0}
.mu.dl-over .mu-dl{color:#D9534F}.mu.dl-near .mu-dl{color:#9A6A1E}
.mu-tag{font-size:10px;color:#fff;padding:2px 8px;border-radius:3px;flex-shrink:0;font-weight:600}
.mu-name{font-size:14px;color:var(--t1)}
.mu-hand{font-size:11px;color:#9A6A1E;background:#FDF6E6;border-top:1px dashed #EADfac;padding:5px 12px}
.ycal-t{font-size:15px;font-weight:700;color:var(--t1);border-left:3px solid #1A1A1A;padding-left:12px;margin-bottom:14px}

.mu{display:block;padding:0;overflow:hidden}
.mu-head{display:flex;align-items:center;gap:12px;padding:10px 12px;cursor:pointer}
.mu-arrow{margin-left:auto;color:var(--t3);font-size:10px}
.mu-body{padding:4px 12px 14px;border-top:1px solid var(--b1)}
.mu.open{border-left-color:#1A1A1A}

.mu.mu-done{opacity:.6;border-left-color:#2E7D32}
.mu-ok{color:#2E7D32;font-weight:700}

@media(max-width:600px){
  .hero{padding:12px 4vw 0;position:static}
  .h-title{font-size:24px}
  .kicker{font-size:10px}
  .h-sub{font-size:11px}
  .tabs{flex-wrap:wrap}
  .tab{padding:8px 10px;font-size:13px}
  .page{padding:0 3vw}
  .pwrap,.main{padding-left:0;padding-right:0}
  /* 標題列右側按鈕(匯入/還原/PDF)換行 */
  .hero .topbtns,.topbtns{flex-wrap:wrap}
  /* 你的工作 */
  .myurgent{padding:12px 10px}
  .mu-dl{width:auto;min-width:80px;font-size:11px}
  .mu-head{flex-wrap:wrap;gap:6px}
  .mu-body{padding:4px 6px 12px}
  /* 月曆單欄、卡片不擠 */
  .ycal{grid-template-columns:1fr}
  /* 選品展開內元素 */
  .addrow{flex-wrap:wrap}
  .addrow input{flex:1 1 100%;margin-bottom:6px}
  .addcat{flex:1 1 auto;margin:0 6px 0 0}
  .field input,.field select{font-size:16px}
  /* 已選品行：層內元素可換行不溢出 */
  .prow{padding:10px}
  .prow input,.prow select{max-width:100%}
  .catbar{flex-wrap:wrap}
  .recwrap .rrow{flex-wrap:wrap}
  /* 全鏈進度橫條手機改直排 */
  .chain-flow{flex-direction:column}
  .chain-arrow{transform:rotate(90deg)}
  /* 商品分析種類鈕 */
  .ovcat-bar{gap:6px}
  .ovcat-btn{padding:6px 12px;font-size:12px}
  table.utable{font-size:12px}
}

@media(max-width:600px){
  /* 候選品行：品名獨佔一行，類別/價/次數/加號擠第二行 */
  .recwrap .rrow{flex-wrap:wrap;align-items:center}
  .rrow .rn{flex:1 1 100%;min-width:0;white-space:normal;word-break:break-word;font-size:14px;margin-bottom:2px}
  .rrow .rcat,.rrow .rp,.rrow .rm{font-size:11px}
  .rrow .ab{margin-left:auto}
  /* 已選品名不被壓窄 */
  .prow .pn,.prow .vn,.prow b{white-space:normal;word-break:break-word;min-width:0}
  .mu-name{white-space:normal;word-break:break-word;min-width:0;flex:1}
  /* 容器允許子元素縮 */
  .recwrap,.recs,.prow,.mu-head,.mu-body{min-width:0}
}

.hero{text-align:center}
.hero .tabs{justify-content:center;flex-wrap:wrap;align-items:center}
.hero #userBar{margin:6px 0}
.hero .kicker,.hero .h-title,.hero .h-sub{text-align:center}
/* ===== 流程說明頁 ===== */
.flow{max-width:1180px;margin:0 auto}
.flow-intro{font-size:13px;color:var(--t2);line-height:1.7;background:#FAFAFA;border:1px solid var(--b1);border-radius:8px;padding:14px 16px;margin:6px 0 22px}
.flow-sec{font-family:'Noto Serif TC';font-size:17px;font-weight:700;color:var(--zana);margin:26px 0 4px;display:flex;align-items:center;gap:8px}
.flow-sec .pill{font-size:10px;color:#fff;padding:2px 9px;border-radius:9px;font-weight:600}
.flow-sub{font-size:12px;color:var(--t3);margin-bottom:16px}
/* 直式作業流程 */
.vflow{max-width:600px;margin:4px 0 4px}
.vstep{display:flex;gap:11px;align-items:stretch}
.vstep-num{flex:0 0 28px;width:28px;height:28px;border-radius:50%;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
.vstep-body{flex:1;border:1px solid var(--b1);border-left:4px solid #ccc;border-radius:8px;padding:11px 13px}
.vstep-ttl{font-family:'Noto Serif TC';font-size:14.5px;font-weight:700}
.vstep-desc{font-size:11.5px;line-height:1.55;color:var(--t2);margin-top:4px}
.vstep-roles{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.vrole{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:9px;white-space:nowrap}
.vrole.on{color:#fff}
.vrole.off{background:#F1F1F1;color:#C2C2C2}
.vconn{margin-left:13px;height:14px;border-left:2px dashed #D5D5D5}
/* 角色任務小標(週檔卡用) */
.tl-roles{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tl-role{font-size:10.5px;font-weight:600;color:#fff;padding:3px 9px;border-radius:9px;white-space:nowrap}
/* 週檔卡 */
.wkcard{background:#fff;border:1.5px solid var(--b1);border-left:4px solid #C5A028;border-radius:8px;padding:16px 18px;margin-bottom:8px}
.wkcard b{color:#A07A12}
.wkcard .wk-note{font-size:12px;color:var(--t2);line-height:1.7;margin-top:7px}
/* 圖例 */
.flow-leg{display:flex;flex-wrap:wrap;gap:14px;margin-top:18px;padding:14px 16px;background:#FAFAFA;border:1px solid var(--b1);border-radius:8px}
.flow-leg .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--t2)}
.flow-leg .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
/* 月份個人任務清單 */
.flow-mon{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 10px}
.flow-mon button{border:1px solid var(--b1);background:#fff;border-radius:6px;width:34px;height:34px;font-size:14px;cursor:pointer;color:var(--t2)}
.flow-mon button:hover:not(:disabled){border-color:var(--zana);color:var(--zana)}
.flow-mon button:disabled{opacity:.35;cursor:default}
.flow-mon .fm-cur{font-family:'Noto Serif TC';font-size:18px;font-weight:700;color:var(--zana);min-width:130px;text-align:center}
.pt-hd{font-size:12.5px;color:var(--t2);margin:0 0 12px;text-align:center}
.pt-hd b{color:var(--t1)}
.ptask{border:1px solid var(--b1);border-left:4px solid #ccc;border-radius:8px;padding:11px 13px;margin-bottom:9px;background:#fff}
.ptask.done{background:#FAFCFB}
.pt-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.pt-when{font-family:'Noto Serif TC';font-size:14.5px;font-weight:700;color:var(--t1)}
.pt-stage{font-weight:700}
.pt-for{font-size:12.5px;color:var(--t2);margin-top:7px;line-height:1.5}
.pt-for b{color:var(--t1)}
.pt-fortag{display:inline-block;font-size:9.5px;color:#fff;padding:1px 7px;border-radius:4px;margin-right:5px;font-weight:600;vertical-align:middle}
.pt-hand{margin-top:9px;padding-top:8px;border-top:1px dashed #ECE7DE;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.hand{font-size:10.5px;padding:2px 9px;border-radius:9px;font-weight:600;white-space:nowrap}
.hand.ok{background:#E3F3E8;color:#1B7A3D}
.hand.no{background:#FBEDE9;color:#C0392B}
.hand.todo{background:#F4F1EA;color:#9A8B6B}
.flow-empty{padding:26px;text-align:center;color:var(--t3);font-size:13px;border:1px dashed var(--b1);border-radius:8px}
.wk-inline{margin-top:12px;font-size:12px;line-height:1.6;color:var(--t2);background:#FFFDF3;border:1px solid #EFE3C0;border-left:3px solid #C5A028;border-radius:6px;padding:10px 13px}
.wk-inline b{color:#A07A12}
@media(max-width:560px){
  .flow-sec{font-size:15px}
}

/* ============================================================
   設計系統統一層 — 墨黑 + 香檳金
   收斂先前疊加的多套主色（綠/薄荷/桃紅）為單一專業調性
   ============================================================ */
:root{
  --zana:#1A1A1A;--teal:#1A1A1A;--blue:#1A1A1A;--rose:#1A1A1A;
  --gold:#B89A4E;--gold-d:#8A6E33;--gold-soft:#F4F0E6;
  --bg:#FFFFFF;--s1:#FFFFFF;--paper:#FAFAF8;
  --b1:#E7E3DB;--b2:#D8D3C8;
  --t1:#1A1A1A;--t2:#57534E;--t3:#8E8A82;
  --ok:#3E7D5A;--ok-bg:#EAF3EE;--warn:#9A7B2E;--warn-bg:#F8F1E0;--bad:#B23B36;--bad-bg:#FBECEB;
}
body{font-size:14px;color:var(--t1);background:var(--bg)}

/* —— 品牌色統一：桃紅/薄荷/雜綠 → 墨黑＋金 —— */
.wt-hi{background:none!important;-webkit-text-fill-color:#1A1A1A!important;color:#1A1A1A!important}
.wt-cta,.wt-cta:hover{background:#1A1A1A!important}
.dash-t,.chain-t,.sec-line,.vsec,.ycal-t,.home-t,.rh-title{border-left-color:var(--gold)!important}
.ycard-h{background:#1A1A1A!important}
.ycard{border-top:3px solid var(--gold)!important}
.tab.on{color:#1A1A1A!important;border-bottom:2px solid var(--gold)!important;font-weight:700}
.impb,.impb:hover{background:#1A1A1A!important}
.vbtn{background:#1A1A1A}.vbtn:hover{background:#000}
.lg-btn{background:#1A1A1A}.lg-btn:hover{background:#000}
.recBtn{border-color:#1A1A1A;color:#1A1A1A}.recBtn:hover{background:#F5F4F1}.recBtn.on{background:#1A1A1A;color:#fff}
.kicker{color:var(--gold-d)}
.h-title b,.lg-title b{color:var(--gold-d)}
.hero{border-bottom:3px solid var(--gold)}
.dsec::before{background:var(--gold)}
.gb .v{color:var(--gold)}
.mbar .mf{background:linear-gradient(90deg,var(--gold),#1A1A1A)}

/* 列印報表：薄荷 → 墨黑＋金 */
.rpt-head{border-bottom-color:var(--gold)!important}
.rpt-brand b,.rpt-month .m,.rpt-sum .sv b,.rpt-msec-h,.rpt-cr{color:#1A1A1A!important}
.rpt-ch{border-left-color:var(--gold)!important}
.rpt-cn .ct{background:#1A1A1A!important}

/* —— 狀態語意色統一（成功/提醒/逾期）—— */
.rc-stat.rc-ok{background:var(--ok)!important}
.task-prev.prev-ok,.hand.ok,.vweb.ok{background:var(--ok-bg)!important;color:var(--ok)!important}
.dl-near,.task-prev.prev-wait,.hand.todo,.vweb.wait{background:var(--warn-bg)!important;color:var(--warn)!important}
.dl-over{background:var(--bad-bg)!important;color:var(--bad)!important}
.dl-ok{background:#F2F1ED;color:#6B675F}
.task-role{background:var(--gold-soft);color:var(--gold-d)}

/* —— 圓角收斂：卡片 6px、元件 4px —— */
.home-card,.ycard,.vstep-body,.flow-leg,.wkcard,.myurgent,.urgent,.planbox,.vplan,.lg-card,.rcamp,.camp,.task,.mu,.chain-step,.ptask,.wk-inline,.mnote{border-radius:6px!important}
.tab,.impb,.expb,.lockb,.clrb,.rstopen,.rstb,.lg-btn,.flagb,.catb,.dfb,.rtype,.srcb,.memob,.recBtn,.vbtn,.ovcat-btn,.qtybox input,.addrow input,.addrow button,.efield input,.efield textarea,.task-role{border-radius:4px!important}
#restoreBox>div,#editBox>div{border-radius:8px!important}

/* —— 卡片質感：細邊＋極簡陰影＋穩定 hover（不跳動）—— */
.home-card,.ycard,.rcamp,.camp,.task,.chain-step{border:1px solid var(--b1);box-shadow:0 1px 2px rgba(20,18,15,.04)}
.home-card:hover,.task:hover,.chain-step:hover{box-shadow:0 3px 12px rgba(20,18,15,.08)!important;transform:none!important;border-color:var(--b2)!important}

/* —— 砍掉多餘說明、收緊間距 —— */
.flow-intro,.dnote{display:none!important}
.h-sub{margin-bottom:10px}
.hero{padding-top:18px}
.page{padding-top:18px}
.home-t{font-size:26px}.rh-title{font-size:22px}

/* ============================================================
   策略選品台（彈出全螢幕）— 墨黑 + 香檳金
   ============================================================ */
#skuConsole{position:fixed;inset:0;z-index:600;display:none;background:rgba(20,18,15,.5)}
#skuConsole.on{display:flex}
.skc{background:#fff;margin:auto;width:96%;max-width:1180px;height:92vh;border-radius:8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(20,18,15,.35)}
.skc-head{display:flex;align-items:center;gap:14px;padding:15px 22px;background:#1A1A1A;color:#fff;flex-shrink:0}
.skc-head .t{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700}
.skc-head .t b{color:var(--gold)}
.skc-head .sub{font-size:12px;color:#B6B0A4;margin-top:2px}
.skc-x{margin-left:auto;background:none;border:none;color:#fff;font-size:25px;cursor:pointer;line-height:1;opacity:.8}
.skc-x:hover{opacity:1}
.skc-filters{padding:13px 22px;border-bottom:1px solid var(--b1);background:var(--paper);flex-shrink:0}
.skc-sugg{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;padding:9px 12px;background:var(--gold-soft);border:1px solid #E6DCC2;border-radius:6px}
.skc-sugg-l{font-size:11.5px;font-weight:700;color:var(--gold-d);margin-right:4px;letter-spacing:.03em}
.skc-skw{font-size:12px;padding:3px 11px;border:1px solid #DFD3B4;border-radius:13px;background:#fff;color:var(--t2);cursor:pointer;white-space:nowrap}
.skc-skw:hover{border-color:var(--gold);color:var(--gold-d)}
.skc-skw.note{cursor:default;border-style:dashed;color:var(--t3)}
.skc-skw.note:hover{border-color:#DFD3B4;color:var(--t3)}
.skc-fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:10px 22px}
.skc-fg label{display:block;font-size:10.5px;letter-spacing:.1em;color:var(--t3);margin-bottom:5px;font-weight:700}
.skc-chips{display:flex;flex-wrap:wrap;gap:5px}
.skc-chip{font-size:12px;padding:3px 11px;border:1px solid var(--b2);border-radius:13px;background:#fff;color:var(--t2);cursor:pointer;user-select:none;white-space:nowrap}
.skc-chip:hover{border-color:var(--gold)}
.skc-chip.inc{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
.skc-chip.inc::before{content:"✓ "}
.skc-chip.exc{background:var(--bad-bg);color:var(--bad);border-color:#E3B9B6}
.skc-chip.exc::before{content:"− "}
.skc-chip .n{opacity:.5;font-size:10px;margin-left:3px}
.skc-tools{display:flex;align-items:center;gap:12px;margin-top:11px;flex-wrap:wrap}
.skc-search{flex:1;min-width:180px}
.skc-search input{width:100%;border:1px solid var(--b2);border-radius:4px;padding:8px 13px;font-size:14px;font-family:inherit;outline:none}
.skc-search input:focus{border-color:var(--gold)}
.skc-hint{font-size:11px;color:var(--t3)}
.skc-hint .ok{color:#1A1A1A;font-weight:700}.skc-hint .no{color:var(--bad);font-weight:700}
.skc-count{font-size:12px;color:var(--t2);font-weight:600;white-space:nowrap}
.skc-count b{color:var(--gold-d);font-size:14px}
.skc-reset{font-size:12px;padding:7px 13px;border:1px solid var(--b2);border-radius:4px;background:#fff;color:var(--t2);cursor:pointer}
.skc-reset:hover{border-color:var(--gold);color:var(--gold-d)}
.skc-body{flex:1;overflow:auto}
.skc-tbl{width:100%;border-collapse:collapse;font-size:13px}
.skc-tbl thead th{position:sticky;top:0;background:#F3F1EB;color:var(--t2);font-size:11px;font-weight:700;text-align:left;padding:10px 12px;border-bottom:1px solid var(--b2);white-space:nowrap;cursor:pointer;z-index:2}
.skc-tbl th.num{text-align:right}
.skc-tbl th.on{color:var(--gold-d)}
.skc-tbl td{padding:9px 12px;border-bottom:1px solid #F1EFE9;vertical-align:middle}
.skc-tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.skc-tbl tbody tr:hover td{background:#FBFAF6}
.skc-nm{font-weight:600;color:var(--t1);max-width:340px;line-height:1.4}
.skc-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#fff;border:1px solid var(--b1);color:var(--t2);white-space:nowrap}
.skc-rev{font-weight:700;color:var(--gold-d)}
.skc-add{width:30px;height:30px;border:1px solid var(--b2);background:#fff;border-radius:6px;color:#1A1A1A;font-size:17px;cursor:pointer;line-height:1}
.skc-add:hover{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
.skc-add.added{background:var(--ok-bg);color:var(--ok);border-color:#A9D3BF;cursor:default}
.skc-foot{padding:8px 22px;border-top:1px solid var(--b1);font-size:11px;color:var(--t3);background:var(--paper);text-align:center;flex-shrink:0}
.skc-empty{padding:50px;text-align:center;color:var(--t3)}
@media(max-width:600px){
  .skc{width:100%;height:100%;border-radius:0}
  .skc-fgrid{grid-template-columns:1fr;gap:8px}
  .skc-nm{max-width:150px}
  .skc-tbl .hidem{display:none}
  .skc-tbl td,.skc-tbl thead th{padding:8px 9px}
}
/* ===== 工作順序大數字 ===== */
.wchain{display:flex;align-items:stretch;gap:6px;margin:2px 0 22px;flex-wrap:wrap}
.wstep{flex:1;min-width:128px;display:flex;align-items:center;gap:11px;padding:11px 14px;border:1px solid var(--b1);border-radius:6px;background:#fff}
.wstep .wn{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--b2);line-height:1;flex-shrink:0}
.wstep .wt{display:flex;flex-direction:column;gap:2px;min-width:0}
.wstep .wl{font-size:14px;font-weight:700;color:var(--t2)}
.wstep .ww{font-size:11px;color:var(--t3)}
.wstep.me{border:1.5px solid #1A1A1A;background:var(--gold-soft)}

async function makeBackup(){
  try{
    await DB.collection("tzg").doc(tsId()).set({picks:PICKS,locked:LOCKED,label:tsLabel(),time:Date.now()});
    // 清理：只留最近20份
    const snap=await DB.collection("tzg").get();
    const bks=snap.docs.filter(d=>d.id.indexOf("backup_")===0).map(d=>({id:d.id,time:(d.data().time||0)})).sort((a,b)=>b.time-a.time);
    if(bks.length>20){for(const old of bks.slice(20)){await DB.collection("tzg").doc(old.id).delete();}}
  }catch(e){console.error("備份失敗",e);}
}
// 列出備份
async function listBackups(){
  const snap=await DB.collection("tzg").get();
  return snap.docs.filter(d=>d.id.indexOf("backup_")===0).map(d=>{const x=d.data();let rev=0;const pk=x.picks||{};for(const id in pk)for(const p of pk[id])rev+=(p.qty||0)*(p.price||0);return{id:d.id,label:x.label||d.id,time:x.time||0,rev};}).sort((a,b)=>b.time-a.time);
}

// 蒐集所有未完成待辦（按deadline排序）
function collectTasks(){
  const RN={campaign:"企劃",pick:"選品",web:"官網",line:"lineoa"};
  const RWHO={campaign:"Vito",pick:"Regina",web:"家逸",line:"Jessica"};
  const myrole=(CUR&&USER_ROLE[CUR.name])||"all";
  const roles=(myrole==="all")?["campaign","pick","web","line"]:[myrole];
  const tasks=[];
  for(const c of CAMPS){
    if(c.type==="寵粉")continue;
    for(const role of roles){
      const s=roleStat(role,c);
      if(s.ok)continue; // 已完成跳過
      const dl=dlInfoRole(c,role);
      // 上游關：選品→官網→lineoa
      const PREV={pick:null,campaign:null,web:"pick",line:"web"};
      const prev=PREV[role];let prevOk=true,prevTxt="";
      if(prev){const ps=roleStat(prev,c);prevOk=ps.ok;
        if(prevOk)prevTxt="✓ 可開始";
        else prevTxt="⏳ 等 "+RWHO[prev]+" "+RN[prev];
      }
      tasks.push({role:role,rname:RN[role],who:RWHO[role],cid:c.id,cname:cv(c,"name"),days:dl.days,dltxt:dl.txt,cls:dl.cls,prevOk:prevOk,prevTxt:prevTxt});
    }
  }
  tasks.sort((a,b)=>a.days-b.days);
  return tasks;
}

// 解析檔期活動日（用 c.date "6/7" + c.month 年份）
function campStartDate(c){
  const ym=(c.month||"2026-06").split("-");let yr=parseInt(ym[0]);const mm=parseInt(ym[1]);
  if(c.date&&/^\s*\d{1,2}\/\d{1,2}\s*$/.test(c.date)){
    const p=c.date.split("/");const mo=parseInt(p[0]),dy=parseInt(p[1]);
    let useYr=yr;if(mo<mm-6)useYr=yr+1;
    return new Date(useYr,mo-1,dy);
  }
  return new Date(yr,mm-1,15); // 無明確活動日(週檔等)→用該月中
}
// 取某日期所在週的週四
function toThursday(d){const x=new Date(d);const day=x.getDay();/*0日1一..4四*/const diff=4-day;x.setDate(x.getDate()+diff);return x;}
// 各關倒推 deadline（對齊週四）
// 大檔/季檔：選品行銷 檔前7週、官網 5週、lineoa上線 4週(=一個月)，環環相扣不卡時間
// 週檔/寵粉：只跟 lineoa 相關，提前1週預排（僅 Vito/Jessica 相關）
const ROLE_OFFSET={campaign:7,pick:7,web:5,line:4};
// 哪些角色看得到週檔/寵粉：選品(Regina)、行銷(Vito)、lineoa(Jessica)；官網(家逸)不含
function roleSeesWeekly(role){return role==="pick"||role==="campaign"||role==="line";}
function isWeekly(c){return c.type==="週檔"||c.type==="寵粉";}
function roleDeadline(c,role){
  const A=campStartDate(c);
  const wk=ROLE_OFFSET[role]!==undefined?ROLE_OFFSET[role]:0;
  const d=new Date(A);d.setDate(d.getDate()-wk*7);
  return toThursday(d);
}
function dlInfoRole(c,role){
  if(isWeekly(c)){
    if(seesCamp(role,c))return {cls:'dl-near',txt:'提前1週預排',days:7,date:null};
    return {cls:'dl-ok',txt:'—',days:999,date:null};
  }
  const d=roleDeadline(c,role);const today=new Date(2026,5,5);
  const days=Math.round((d-today)/86400000);
  const md=(d.getMonth()+1)+"/"+d.getDate();
  let cls='dl-ok',txt=md+" 前";
  if(days<0){cls='dl-over';txt=md+'·逾期'+(-days)+'天';}
  else if(days<=7){cls='dl-near';txt=md+'·剩'+days+'天';}
  else txt=md+'·'+days+'天';
  return {cls:cls,txt:txt,days:days,date:d};
}

function seesCamp(role,c){

function skcVals(key){

function skcMatch(s){
  for(const key of SKFKEYS){
    const st=SKSTATE[key];const incs=[],excs=[];for(const v in st){if(st[v]===1)incs.push(v);else if(st[v]===-1)excs.push(v);}

  const picks=SKC_CID?getPicks(SKC_CID).map(function(p){return p.name;}):[];
  const show=rows.slice(0,200);const tb=document.getElementById("skc_tbody");
  if(show.length===0){tb.innerHTML='<tr><td colspan="10" class="skc-empty">沒有符合的商品，調整篩選看看</td></tr>';return;}
  tb.innerHTML=show.map(function(s){var added=picks.indexOf(s.n)>=0;var idx=all.indexOf(s);
    return '<tr>'+
      '<td class="skc-nm">'+s.n+'</td>'+
      '<td><span class="skc-tag">'+s.c+'</span></td>'+
      '<td class="hidem">'+s.lcg+'</td>'+
      '<td class="hidem">'+(Array.isArray(s.ps)?s.ps.join("、"):s.ps)+'</td>'+
      '<td class="num skc-rev">'+(s.rev>=10000?(s.rev/10000).toFixed(1)+"萬":(s.rev||0).toLocaleString())+'</td>'+
      '<td class="num hidem">'+s.cnt+'</td>'+
      '<td class="num">'+(s.avg?"$"+s.avg.toLocaleString():"—")+'</td>'+
      '<td class="num hidem">'+s.ords+'</td>'+
      '<td class="num hidem">'+(s.days<0?"在售":s.days)+'</td>'+
      '<td><button class="skc-add'+(added?" added":"")+'" '+(added?"disabled":'onclick="skcAdd('+idx+')"')+'>'+(added?"✓":"＋")+'</button></td>'+
    '</tr>';}).join("");
}
function skuCat(c){
  if(c.indexOf("裸石")>=0)return "裸石";
  if(c.indexOf("訂製")>=0)return "訂製";
  if(c.indexOf("水晶")>=0||c.indexOf("晶體")>=0||c.indexOf("擺件")>=0)return "水晶能量";
  if(c.indexOf("戒")>=0||c.indexOf("項")>=0||c.indexOf("耳")>=0||c.indexOf("手串")>=0||c.indexOf("吊墜")>=0||c.indexOf("飾")>=0)return "飾品";
  return "其他";
}
function skcAdd(idx){
  if(!SKC_CID){return;}
  if(!canAddPick()){toast("沒有權限");return;}
  const s=window.SKU[idx];if(!s)return;const id=SKC_CID;
  PICKS[id]=PICKS[id]||[];
  if(PICKS[id].some(function(p){return p.name===s.n;})){toast("這檔已加過");return;}
  const c=CAMP[id];const est=Math.max(2,Math.round((s.qty/16)*(c?c.mult:1)));
  PICKS[id].push({name:s.n,price:s.avg||0,qty:est,flags:{},cat:skuCat(s.c)});
  save();fineUpdate(id,s.n);skcRender();toast("已加入「"+s.n+"」");
}
</script></body></html>
