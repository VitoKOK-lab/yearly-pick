function tsLabel(){const d=new Date();const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function tsId(){const d=new Date();const p=n=>String(n).padStart(2,"0");return `backup_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;}
async function makeBackup(){
  try{
    await DB.collection("tzg").doc(tsId()).set({picks:PICKS,locked:LOCKED,label:tsLabel(),time:Date.now()});
    // 清理：只留最近20份
    const snap=await DB.collection("tzg").get();
    const bks=snap.docs.filter(d=>d.id.indexOf("backup_")===0).map(d=>({id:d.id,time:(d.data().time||0)})).sort((a,b)=>b.time-a.time);
    if(bks.length>20){for(const old of bks.slice(20)){await DB.collection("tzg").doc(old.id).delete();}}
  }catch(e){console.error("備份失敗",e);}
}
// 列出備份
async function listBackups(){
  const snap=await DB.collection("tzg").get();
  return snap.docs.filter(d=>d.id.indexOf("backup_")===0).map(d=>{const x=d.data();let rev=0;const pk=x.picks||{};for(const id in pk)for(const p of pk[id])rev+=(p.qty||0)*(p.price||0);return{id:d.id,label:x.label||d.id,time:x.time||0,rev};}).sort((a,b)=>b.time-a.time);
}

}

function usedCount(name){let n=0;for(const id in PICKS)if(PICKS[id].some(p=>p.name===name))n++;return n;}
function monthsUsed(name){const ms=[];for(const id in PICKS){if(PICKS[id].some(p=>p.name===name)){const c=CAMP[id];if(c&&!ms.includes(c.month))ms.push(c.month);}}return ms.sort();}
function usedLabel(name,curMonth){const ms=monthsUsed(name).filter(m=>m!==curMonth);if(ms.length===0)return"";return ms.map(m=>ML[m].replace("2026年","").replace("2027年","")).join("、");}
function campRev(id){return getPicks(id).reduce((s,p)=>s+p.qty*p.price,0);}
function cv(c,field){const o=COVER[c.id];if(o&&o[field]!==undefined&&o[field]!=='')return o[field];return c[field];}
// 備貨初估：月均 × 檔期係數
function estStock(name,mult){const p=PMAP[name];if(!p)return 10;return Math.max(2,Math.round(p.monthly*mult));}

function addPick(id,name){
  PICKS[id]=PICKS[id]||[];
  if(PICKS[id].some(p=>p.name===name)){toast("這檔已加過");return;}
  const pm=PMAP[name];const c=CAMP[id];
  PICKS[id].push({name,price:pm?pm.price:0,qty:pm?estStock(name,c.mult):10,flags:{}});
  save();render();toast("已加入「"+name+"」");
}
function delPick(id,name){PICKS[id]=getPicks(id).filter(p=>p.name!==name);save();render();}
function setQty(id,name,v){const p=getPicks(id).find(p=>p.name===name);if(p){p.qty=Math.max(0,parseInt(v)||0);save();renderTotals();}}
function toggleFlagEl(el){const id=el.dataset.c;const name=decodeURIComponent(el.dataset.n);const f=el.dataset.f;const p=getPicks(id).find(x=>x.name===name);if(!p)return;p.flags=p.flags||{};p.flags[f]=!p.flags[f];save();render();}
function addCustom(id){const inp=document.getElementById('inp-'+id);const v=inp.value.trim();if(!v)return;PICKS[id]=PICKS[id]||[];if(!PICKS[id].some(p=>p.name===v)){PICKS[id].push({name:v,price:0,qty:10,flags:{}});save();render();toast("已加入「"+v+"」");}inp.value="";}
function toggleOpen(id){document.getElementById('camp-'+id).classList.toggle('open');}
function setCat(id,cat){CATSEL[id]=cat;render();}

// 取某檔某類別的建議品
function recsFor(c){
  if(c.rec_seed && (CATSEL[c.id]||"主題建議")==="主題建議")return c.rec_seed;
  const cat=CATSEL[c.id]||"主題建議";
  let list;
  if(cat==="主題建議"){
    if(c.kw){list=POOL.filter(p=>c.kw.some(k=>p.name.indexOf(k)>=0));}
    else{list=POOL.filter(p=>!c.maxp||p.price<=c.maxp);}
  }else{
    list=POOL.filter(p=>p.cat===cat);
    if(c.maxp&&(c.type==="寵粉"))list=list.filter(p=>p.price<=c.maxp);
  }
  return list.slice(0,30);
}

function renderType(types,cid){
  const openIds=[...document.querySelectorAll('.camp.open')].map(e=>e.id);
  let h="";
  for(const m of MONTHS){
    const cs=CAMPS.filter(c=>c.month===m&&types.indexOf(c.type)>=0);
    if(cs.length===0)continue;const mrev=cs.reduce((s,c)=>s+campRev(c.id),0);
    const isLk=LOCKED[m];const note=NOTES[m]||"";
    h+=`<div class="month"><div class="mhead"><span>${ML[m]}${isLk?'<span class="lockbadge">🔒 已定案</span>':''}</span><div class="mhead-btns"><span class="mrev">本月預估 <b>${wan(mrev).toFixed(0)}</b> 萬</span><button class="lockb ${isLk?'locked':''}" onclick="toggleLock('${m}')">${isLk?'🔓 解鎖':'🔒 鎖定本月'}</button>${!isLk?`<button class="clrb" onclick="clearMonth('${m}')">清除本月</button>`:''}${isLk?`<button class="expb" onclick="exportMonth('${m}')">⤓ 匯出 PDF</button>`:''}</div></div>`;
    h+=note?`<div class="mnote" onclick="editNote('${m}')">📌 ${note.replace(/\n/g,"<br>")}</div>`:`<div class="mnote empty-note" onclick="editNote('${m}')">＋ 加本月活動備註（儲值/直播）</div>`;
    for(const c of cs){
      const picks=getPicks(c.id);const rev=campRev(c.id);const done=picks.length>0;
      const curcat=CATSEL[c.id]||"主題建議";
      let catbar="";
      for(const ct of CATS){const cnt = ct==="主題建議"?"":` `;catbar+=`<div class="catb ${curcat===ct?'on':''}" onclick="event.stopPropagation();setCat('${c.id}','${ct}')">${ct}</div>`;}
      let recs="";
      for(const r of recsFor(c)){const added=picks.some(p=>p.name===r.name);
        recs+=`<div class="rrow ${added?'added':''}" onclick="addPick('${c.id}','${r.name.replace(/'/g,"\\'")}')"><span class="rn">${r.name}</span><span class="rcat" style="background:${CATC[r.cat]}">${r.cat}</span><span class="rp">$${r.price.toLocaleString()}</span><span class="rm">月均${r.monthly}</span><span class="ab">${added?'✓':'＋'}</span></div>`;}
      let picked="";
      if(picks.length===0)picked=`<div class="empty">還沒選品。上面切類別挑（裸石也在），或自己打。</div>`;
      else for(const p of picks){const uc=usedCount(p.name);
        const um=usedLabel(p.name,c.month);const fl=p.flags||{};const flagbtns=FLAGS.map(function(f){return '<span class="flagb '+(fl[f[0]]?'on':'')+'" data-c="'+c.id+'" data-n="'+encodeURIComponent(p.name)+'" data-f="'+f[0]+'" onclick="toggleFlagEl(this)">'+f[2]+'</span>';}).join("");picked+=`<div class="prow prow2"><div class="prow-main"><span class="pn">${p.name}</span><span class="used">${p.memo?"📝"+p.memo:(uc>1?`全年${uc}檔`:"僅此檔")}${um?` · 另排:${um}`:""}</span><div class="qtybox"><label>備貨</label><input type="number" value="${p.qty}" onchange="setQty('${c.id}','${p.name.replace(/'/g,"\\'")}',this.value)"></div><span class="prowrev">${p.price?(Math.round(p.qty*p.price/1000)/10)+'萬':'—'}</span><button class="delb" onclick="delPick('${c.id}','${p.name.replace(/'/g,"\\'")}')">×</button></div><div class="prow-flags">${flagbtns}${p.memo?`<span class="pmemo">📝${p.memo}</span>`:""}</div></div>`;}
      h+=`<div class="camp ${done?'done':''} ${LOCKED[m]?'lockedm':''}" id="camp-${c.id}">
        <div class="ch" onclick="toggleOpen('${c.id}')"><div><div class="cname">${cv(c,'name')} <span class="ctype" style="background:${TYC[c.type]}">${c.type}</span> <span class="editc" onclick="event.stopPropagation();openEditCamp('${c.id}')">✎ 編輯</span></div><div class="cmeta">${cv(c,'date')} · <span class="cgoal">${cv(c,'goal')}</span> · ${picks.length}品 · 備貨×${c.mult}</div></div><div class="cright"><div class="rev">${rev?wan(rev).toFixed(0):'0'}<span style="font-size:11px"> 萬</span></div><div class="rl">預估</div></div></div>
        <div class="cbody"><div class="brief">${cv(c,'brief')}<br><span class="who">客層：${c.who}</span></div>
        <div class="sl">選品（切類別挑真實熱賣，月均=該品歷史每月賣幾件）</div>
        <div class="catbar">${catbar}</div><div class="recs">${recs}</div>
        <div class="sl">這檔選品＋備貨（初估=月均×${c.mult}，可改，自動算營收）</div>
        <div class="picked">${picked}<div class="addrow"><input id="inp-${c.id}" placeholder="自己打商品名..." onkeydown="if(event.key==='Enter')addCustom('${c.id}')"><button onclick="addCustom('${c.id}')">加入</button></div></div>
        </div></div>`;
    }
    h+=`</div>`;
  }
  document.getElementById(cid).innerHTML=h;
  openIds.forEach(id=>{const e=document.getElementById(id);if(e)e.classList.add('open');});
}
function renderTotals(){
  document.querySelectorAll('.month').forEach((mEl,i)=>{const m=MONTHS[i];const mrev=CAMPS.filter(c=>c.month===m).reduce((s,c)=>s+campRev(c.id),0);const b=mEl.querySelector('.mrev b');if(b)b.textContent=wan(mrev).toFixed(0);});
  CAMPS.forEach(c=>{const el=document.getElementById('camp-'+c.id);if(!el)return;const rev=campRev(c.id);const r=el.querySelector('.cright .rev');if(r)r.innerHTML=(rev?wan(rev).toFixed(0):'0')+'<span style="font-size:11px"> 萬</span>';
    el.querySelectorAll('.prow').forEach(pr=>{const nm=pr.querySelector('.pn').textContent;const p=getPicks(c.id).find(x=>x.name===nm);if(p){const rv=pr.querySelector('.prowrev');if(rv)rv.textContent=p.price?(Math.round(p.qty*p.price/1000)/10)+'萬':'—';}});});
}
function renderOverview(){
  let total=0,totalItems=0;const byProd={};
  for(const id in PICKS){for(const p of PICKS[id]){const rev=p.qty*p.price;total+=rev;totalItems+=p.qty;
    if(!byProd[p.name])byProd[p.name]={n:0,qty:0,rev:0};byProd[p.name].n++;byProd[p.name].qty+=p.qty;byProd[p.name].rev+=rev;}}
  let h=`<div class="gb-row"><div class="gb"><div class="l">全年預估營收</div><div class="v">${wan(total).toFixed(0)}<span> 萬</span></div></div>
   <div class="gb alt"><div class="l">總備貨件數</div><div class="v">${fmt(totalItems)}<span> 件</span></div></div>
   <div class="gb alt"><div class="l">已排商品種類</div><div class="v">${Object.keys(byProd).length}<span> 種</span></div></div>
   <div class="gb alt"><div class="l">已填檔期</div><div class="v">${Object.keys(PICKS).filter(k=>PICKS[k].length>0).length}<span>/${CAMPS.length}</span></div></div></div>`;
  h+=`<div class="dsec">每月預估營收</div>`;
  const mrevs=MONTHS.map(m=>[m,CAMPS.filter(c=>c.month===m).reduce((s,c)=>s+campRev(c.id),0)]);const mm=Math.max(1,...mrevs.map(x=>x[1]));
  for(const [m,v] of mrevs)h+=`<div class="mbar"><div class="ml">${ML[m]}</div><div class="mt"><div class="mf" style="width:${v/mm*100}%"></div></div><div class="mv">${wan(v).toFixed(0)}萬</div></div>`;
  h+=`<div class="dsec">商品使用次數（看排太多／太少）</div><div class="dnote">用越多檔＝越主打（≥5檔標紅）；只1檔＝點綴。備貨/營收跟排程連動</div>`;
  const prods=Object.entries(byProd).sort((a,b)=>b[1].n-a[1].n||b[1].rev-a[1].rev);
  if(prods.length===0)h+=`<div class="empty">還沒排任何品。去排程頁一檔一檔選。</div>`;
  else{const maxn=prods[0][1].n;h+=`<table class="utable"><thead><tr><th>商品</th><th class="n">用幾檔</th><th class="n">總備貨</th><th class="n">貢獻營收</th></tr></thead><tbody>`;
    for(const [nm,d] of prods){const tag=d.n>=5?'warn-much':(d.n===1?'warn-few':'');h+=`<tr><td>${nm}</td><td class="n"><span class="usedbar" style="width:${d.n/maxn*40+4}px"></span><span class="${tag}">${d.n}</span></td><td class="n">${fmt(d.qty)}</td><td class="n">${wan(d.rev).toFixed(1)}萬</td></tr>`;}
    h+=`</tbody></table>`;}
  document.getElementById('p1').innerHTML=h;
}

function exportMonth(m){
  const cs=CAMPS.filter(c=>c.month===m).filter(c=>getPicks(c.id).length>0);
  let total=0,items=0;cs.forEach(c=>{total+=campRev(c.id);getPicks(c.id).forEach(p=>items+=p.qty);});
  const today=new Date().toLocaleDateString('zh-TW');
  let blocks="";
  for(const c of cs){
    const picks=getPicks(c.id);let rows="";
    for(const p of picks){const pm=PMAP[p.name];rows+=`<tr><td>${p.name}</td><td>${pm?pm.cat:'—'}</td><td class="n">${p.price?'$'+p.price.toLocaleString():'—'}</td><td class="n">${p.qty}</td><td class="n">${p.price?(Math.round(p.qty*p.price/1000)/10)+'萬':'—'}</td></tr>`;}
    blocks+=`<div class="rpt-camp"><div class="rpt-ch"><div class="rpt-cn">${c.name}<span class="ct">${c.type}</span></div><div style="text-align:right"><div class="rpt-cr">${wan(campRev(c.id)).toFixed(1)} 萬</div><div class="rpt-cm">${c.date} · ${c.goal}</div></div></div><table class="rpt-tbl"><thead><tr><th>商品</th><th>類別</th><th class="n">單價</th><th class="n">備貨</th><th class="n">預估營收</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  if(cs.length===0){toast("本月還沒選品");return;}
  const html=`<div class="rpt">
    <div class="rpt-head"><div><div class="rpt-brand">TZG <b>·</b> 泰熙爾札娜</div><div class="rpt-tag">選品備貨表 · 私域系統化變現</div></div><div class="rpt-month"><div class="m">${ML[m]}</div><div class="d">產出 ${today}</div></div></div>
    <div class="rpt-sum"><div class="s"><div class="sl2">本月預估營收</div><div class="sv"><b>${wan(total).toFixed(0)}</b> 萬</div></div><div class="s"><div class="sl2">總備貨件數</div><div class="sv">${items.toLocaleString()} 件</div></div><div class="s"><div class="sl2">檔期數</div><div class="sv">${cs.length} 檔</div></div></div>
    ${blocks}
    <div class="rpt-foot">TZG 泰熙爾札娜珠寶 ｜ ${ML[m]} 選品備貨表 ｜ 把對的寶石，送到對的人手上</div></div>`;
  document.getElementById('print-area').innerHTML=html;
  window.print();
}

function exportYear(){
  let total=0,items=0,filled=0;
  const monthBlocks=[];
  for(const m of MONTHS){
    const cs=CAMPS.filter(c=>c.month===m).filter(c=>getPicks(c.id).length>0);
    if(cs.length===0)continue;
    filled++;let mtot=0,mit=0;
    let camps="";
    for(const c of cs){
      const picks=getPicks(c.id);let rows="";
      for(const p of picks){const pm=PMAP[p.name];rows+=`<tr><td>${p.name}</td><td>${pm?pm.cat:'—'}</td><td class="n">${p.price?'$'+p.price.toLocaleString():'—'}</td><td class="n">${p.qty}</td><td class="n">${p.price?(Math.round(p.qty*p.price/1000)/10)+'萬':'—'}</td></tr>`;mtot+=p.qty*p.price;mit+=p.qty;}
      camps+=`<div class="rpt-camp"><div class="rpt-ch"><div class="rpt-cn">${c.name}<span class="ct">${c.type}</span></div><div style="text-align:right"><div class="rpt-cr">${wan(campRev(c.id)).toFixed(1)} 萬</div><div class="rpt-cm">${c.date} · ${c.goal}</div></div></div><table class="rpt-tbl"><thead><tr><th>商品</th><th>類別</th><th class="n">單價</th><th class="n">備貨</th><th class="n">預估營收</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    total+=mtot;items+=mit;
    monthBlocks.push(`<div class="rpt-month-sec"><div class="rpt-msec-h">${ML[m]} <span class="rpt-msec-r">${wan(mtot).toFixed(0)} 萬 · ${mit.toLocaleString()} 件</span></div>${camps}</div>`);
  }
  if(filled===0){toast("還沒任何選品");return;}
  const today=new Date().toLocaleDateString('zh-TW');
  const html=`<div class="rpt">
    <div class="rpt-head"><div><div class="rpt-brand">TZG <b>·</b> 泰熙爾札娜</div><div class="rpt-tag">全年度選品備貨總表 · 2026/6–2027/5</div></div><div class="rpt-month"><div class="m" style="font-size:22px">全年度</div><div class="d">產出 ${today}</div></div></div>
    <div class="rpt-sum"><div class="s"><div class="sl2">全年預估營收</div><div class="sv"><b>${wan(total).toFixed(0)}</b> 萬</div></div><div class="s"><div class="sl2">全年總備貨</div><div class="sv">${items.toLocaleString()} 件</div></div><div class="s"><div class="sl2">已排月份</div><div class="sv">${filled} / 12</div></div></div>
    ${monthBlocks.join('')}
    <div class="rpt-foot">TZG 泰熙爾札娜珠寶 ｜ 全年度選品備貨總表 ｜ 把對的寶石，送到對的人手上</div></div>`;
  document.getElementById('print-area').innerHTML=html;window.print();
}

  document.getElementById('ec_name').value=cv(c,'name');
  document.getElementById('ec_date').value=cv(c,'date');
  document.getElementById('ec_goal').value=cv(c,'goal');
  document.getElementById('ec_brief').value=cv(c,'brief');
  document.getElementById('ec_title').textContent=c.type+' \u30fb \u7de8\u8f2f\u4f01\u5283';
  document.getElementById('editBox').style.display='flex';
}
function saveEditCamp(){

  COVER[id]={name:document.getElementById('ec_name').value.trim(),date:document.getElementById('ec_date').value.trim(),goal:document.getElementById('ec_goal').value.trim(),brief:document.getElementById('ec_brief').value.trim()};

  delete COVER[id];pushCloud();render();document.getElementById('editBox').style.display='none';toast('\u5df2\u9084\u539f\u9810\u8a2d');
}


function renderGantt(){
  if(!_loaded){document.getElementById('pg').innerHTML='';return;}
  const totalW=52;
  const colW=100/totalW;
  // 月份刻度（每月起始週）
  const MW={"2026-06":0,"2026-07":4,"2026-08":8,"2026-09":13,"2026-10":17,"2026-11":22,"2026-12":26,"2027-01":31,"2027-02":35,"2027-03":39,"2027-04":43,"2027-05":47};
  let head='<div class="gt-head"><div class="gt-lbl"></div><div class="gt-track">';
  for(const m of MONTHS){const left=MW[m]*colW;head+='<div class="gt-mtick" style="left:'+left+'%">'+ML[m].replace("2026年","").replace("2027年","")+'</div>';}
  head+='</div></div>';
  // 每個檔一條（按類型分組）
  let rows='';
  const order=["大檔","季檔","週檔","寵粉"];
  for(const ty of order){
    const cs=CAMPS.filter(function(c){return c.type===ty;});
    if(cs.length===0)continue;
    rows+='<div class="gt-group">'+ty+'</div>';
    for(const c of cs){
      const sw=c.sw||0,ew=c.ew||(sw+2);
      const left=sw*colW, width=Math.max(colW*0.8,(ew-sw)*colW);
      const col=TYC[c.type]||"#888";
      const rev=campRev(c.id);
      rows+='<div class="gt-row"><div class="gt-lbl" title="'+cv(c,'name')+'">'+cv(c,'name')+'</div><div class="gt-track"><div class="gt-bar" style="left:'+left+'%;width:'+width+'%;background:'+col+'" onclick="jumpTo(\''+c.id+'\')">'+cv(c,'date')+(rev?(' \u00b7 '+wan(rev).toFixed(0)+'\u842c'):'')+'</div></div></div>';
    }
  }
  document.getElementById('pg').innerHTML=head+'<div class="gt-body">'+rows+'</div>';
}

function render(){if(!_loaded){document.getElementById('p0').innerHTML='<div style="text-align:center;padding:60px;color:#A89A8C">☁️ 連線雲端、載入共用資料中…</div>';return;}renderType(['大檔'],'p0');renderType(['季檔'],'ps');renderType(['週檔','寵粉'],'pw');renderGantt();renderOverview();renderDashboard();}
function sw(i){document.querySelectorAll(".tab").forEach(function(t,n){t.classList.toggle("on",n===i);});document.querySelectorAll(".page").forEach(function(p,n){p.classList.toggle("on",n===i);});if(i===3)renderGantt();if(i===4)renderDashboard();if(i===5)renderOverview();window.scrollTo(0,0);}
render();
</script></body></html>
